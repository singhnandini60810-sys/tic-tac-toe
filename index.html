<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Tic Tac Toe</title>

<style>

body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:Arial;
    background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
    background:white;
    padding:25px;
    border-radius:15px;
    width:350px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.board{
    display:grid;
    grid-template-columns:repeat(3,100px);
    gap:8px;
    justify-content:center;
    margin:20px 0;
}

.cell{
    width:100px;
    height:100px;
    font-size:40px;
    border:none;
    background:#f0f0f0;
    cursor:pointer;
    border-radius:10px;
}

.cell:hover{
    background:#e0e0e0;
}

.win{
    background:#90ee90 !important;
}

button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    font-size:16px;
}

.start{
    background:#4CAF50;
    color:white;
}

.restart{
    background:#ff5252;
    color:white;
}

select{
    padding:8px;
    border-radius:8px;
    margin-top:10px;
}

.scoreboard{
    display:flex;
    justify-content:space-between;
    margin-top:10px;
    font-weight:bold;
}

#status{
    font-size:18px;
    margin-top:10px;
}

</style>
</head>

<body>

<div class="container">

<h2>Tic Tac Toe</h2>

<select id="mode">
<option value="pvp">Player vs Player</option>
<option value="ai">Player vs Computer</option>
</select>

<div class="scoreboard">
<div>X Score: <span id="xScore">0</span></div>
<div>O Score: <span id="oScore">0</span></div>
</div>

<div id="status">Press Start</div>

<div class="board">

<button class="cell" onclick="play(0)"></button>
<button class="cell" onclick="play(1)"></button>
<button class="cell" onclick="play(2)"></button>

<button class="cell" onclick="play(3)"></button>
<button class="cell" onclick="play(4)"></button>
<button class="cell" onclick="play(5)"></button>

<button class="cell" onclick="play(6)"></button>
<button class="cell" onclick="play(7)"></button>
<button class="cell" onclick="play(8)"></button>

</div>

<button class="start" onclick="startGame()">Start Game</button>
<button class="restart" onclick="resetGame()">Restart</button>

</div>

<script>

let board=["","","","","","","","",""];
let currentPlayer="X";
let gameActive=false;

let xScore=0;
let oScore=0;

let vsComputer=false;

const winPatterns=[
[0,1,2],
[3,4,5],
[6,7,8],
[0,3,6],
[1,4,7],
[2,5,8],
[0,4,8],
[2,4,6]
];

function startGame(){

let mode=document.getElementById("mode").value;

vsComputer = mode==="ai";

gameActive=true;
document.getElementById("status").innerText="Player X Turn";

}

function play(index){

if(!gameActive || board[index]!="") return;

makeMove(index,currentPlayer);

if(checkWin(currentPlayer)){

updateScore(currentPlayer);
highlightWin(currentPlayer);

document.getElementById("status").innerText=currentPlayer+" Wins!";
gameActive=false;

return;

}

if(!board.includes("")){

document.getElementById("status").innerText="Draw!";
gameActive=false;
return;

}

switchPlayer();

if(vsComputer && currentPlayer==="O" && gameActive){

setTimeout(computerMove,400);

}

}

function makeMove(index,player){

board[index]=player;

let cell=document.getElementsByClassName("cell")[index];

cell.innerText=player;
cell.disabled=true;

}

function switchPlayer(){

currentPlayer=currentPlayer==="X"?"O":"X";
document.getElementById("status").innerText="Player "+currentPlayer+" Turn";

}

function checkWin(player){

return winPatterns.some(pattern =>
pattern.every(i => board[i]===player)
);

}

function highlightWin(player){

for(let pattern of winPatterns){

if(pattern.every(i=>board[i]===player)){

pattern.forEach(i=>{
document.getElementsByClassName("cell")[i].classList.add("win");
});

}

}

}

function computerMove(){

let empty=board
.map((v,i)=>v==""?i:null)
.filter(v=>v!==null);

let move=empty[Math.floor(Math.random()*empty.length)];

play(move);

}

function updateScore(player){

if(player==="X"){

xScore++;
document.getElementById("xScore").innerText=xScore;

}else{

oScore++;
document.getElementById("oScore").innerText=oScore;

}

}

function resetGame(){

board=["","","","","","","","",""];
currentPlayer="X";
gameActive=true;

let cells=document.getElementsByClassName("cell");

for(let cell of cells){

cell.innerText="";
cell.disabled=false;
cell.classList.remove("win");

}

document.getElementById("status").innerText="Player X Turn";

}

</script>

</body>
</html>
